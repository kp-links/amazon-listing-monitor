name: inventory-alert-nature

# ナチュレ（LUBEE）在庫トレンド＆発注アラート。
# 毎日 JST 09:30（=UTC 00:30）に在庫シートを点検し、加速度＋発注点で
# 推奨事項タブを生成（毎日更新）。Chatwork配信は月・水・金のみ（通知ノイズ回避）。
# SP-APIでAmazonの7日/30日販売を取得する。
#
# 秘密情報は monitor.py / sales30d.py と同じ命名を流用（新規Secret不要）:
#   - SPAPI_REFRESH_TOKEN_NATURE … ナチュレ口座
#   - SPAPI_LWA_* / MARKETPLACE / HOST … 全社共通アプリ
#   - SALES_SHEET_ID_NATURE … ナチュレ在庫管理シート(1Xerx)
#   - CHATWORK_TOKEN（共通） / CHATWORK_ROOM_ID_NATURE
#   - GOOGLE_SA_JSON（共通SA・対象シートに編集権限済）
# keep-alive は同リポ cart-monitor が担うため本ワークフロー専用対策は不要。
on:
  schedule:
    # 毎日 UTC 00:30 = JST 09:30（08:05の販売数更新後）。シートは毎日更新。
    # Chatwork投稿は run ステップ内で月・水・金のみに限定。
    - cron: "30 0 * * *"
  workflow_dispatch:             # 手動実行（初回検証・サンプル生成用）
    inputs:
      send_chatwork:
        description: "Chatworkに投稿する(true) / シートだけ更新(false)"
        type: boolean
        default: false           # 手動実行は既定でシートのみ（誤投稿防止）

permissions:
  contents: read

concurrency:
  group: inventory-alert-nature
  cancel-in-progress: false

jobs:
  inventory-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: Inventory trend & reorder alert (Nature)
        env:
          BRAND: nature
          SPAPI_REFRESH_TOKEN: ${{ secrets.SPAPI_REFRESH_TOKEN_NATURE }}
          SPAPI_LWA_CLIENT_ID: ${{ secrets.SPAPI_LWA_CLIENT_ID }}
          SPAPI_LWA_CLIENT_SECRET: ${{ secrets.SPAPI_LWA_CLIENT_SECRET }}
          SPAPI_MARKETPLACE_ID: ${{ secrets.SPAPI_MARKETPLACE_ID }}
          SPAPI_HOST: ${{ secrets.SPAPI_HOST }}
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          SALES_SHEET_ID: ${{ secrets.SALES_SHEET_ID_NATURE }}
          CHATWORK_TOKEN: ${{ secrets.CHATWORK_TOKEN }}
          # 投稿先=【サドナレ】業務メンバーチャット(room 393394277)。
          # cart-monitor用 CHATWORK_ROOM_ID_NATURE と切り離した専用Secretを使う。
          # ※ GitHub に CHATWORK_ROOM_ID_NATURE_INV = 393394277 を登録すること。
          CHATWORK_ROOM_ID: ${{ secrets.CHATWORK_ROOM_ID_NATURE_INV }}
        # シートは毎日更新。Chatwork投稿はスケジュール実行のうち月・水・金のみ。
        # 手動実行は send_chatwork=true の時だけ投稿（既定はシートのみ）。
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.send_chatwork }}" = "true" ]; then
              python inventory_alert.py
            else
              python inventory_alert.py --no-chatwork
            fi
          else
            # スケジュール実行: JST曜日で投稿可否を判定（1=月..7=日）。
            dow=$(TZ=Asia/Tokyo date +%u)
            case "$dow" in
              1|3|5) python inventory_alert.py ;;       # 月・水・金 → Chatwork投稿
              *)     python inventory_alert.py --no-chatwork ;;  # 火木土日 → シートのみ
            esac
          fi
